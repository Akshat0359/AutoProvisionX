---
# ============================================================
# Role: firewall — UFW Firewall Configuration
# ============================================================
# Sets default deny-in / allow-out policy, then opens only
# the ports defined in group_vars/all.yml (allowed_tcp_ports).
# Idempotent: All tasks are safe to re-run.
# Tags: firewall, security
# ============================================================

- name: Install UFW firewall package
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: false
  environment:
    DEBIAN_FRONTEND: noninteractive
  tags: firewall

- name: Set UFW default policy — deny all incoming
  community.general.ufw:
    default: deny
    direction: incoming
  tags: firewall

- name: Set UFW default policy — allow all outgoing
  community.general.ufw:
    default: allow
    direction: outgoing
  tags: firewall

- name: Allow configured TCP ports through firewall
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
    comment: "AutoProvisionX — allowed port"
  loop: "{{ allowed_tcp_ports }}"
  tags: firewall

- name: Allow loopback interface (localhost traffic)
  community.general.ufw:
    rule: allow
    interface: lo
    direction: in
  tags: firewall

- name: Enable UFW firewall safely
  tags: firewall
  block:
    - name: Enable UFW firewall (non-interactive)
      community.general.ufw:
        state: enabled
  rescue:
    - name: Verify UFW failure is within Docker
      ansible.builtin.fail:
        msg: "UFW enable failed outside Docker. This is a real error."
      when: ansible_virtualization_type != 'docker'

- name: Print firewall status
  ansible.builtin.debug:
    msg: "UFW enabled. Allowed TCP ports: {{ allowed_tcp_ports | join(', ') }}"
  tags: firewall
