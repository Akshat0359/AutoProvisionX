---
# ============================================================
# AutoProvisionX — GitHub Actions CI/CD Pipeline
# ============================================================
# Runs on every push and pull request to main/develop.
# Pipeline stages:
#   1. Checkout code
#   2. Set up Python
#   3. Install Ansible + linting tools
#   4. Run yamllint
#   5. Run ansible-lint
#   6. Build Dockerfile.test (target server image)
#   7. Launch test target container
#   8. Execute ansible-playbook against container
#   9. Verify nginx container is running inside target
#  10. Cleanup
# ============================================================

name: AutoProvisionX CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggers

env:
  CONTAINER_NAME: autoprovisionx-target
  IMAGE_NAME: autoprovisionx-test-target
  PYTHON_VERSION: "3.11"
  ANSIBLE_VERSION: ">=8.0.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: "🔍 Lint — YAML & Ansible"
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "ansible${{ env.ANSIBLE_VERSION }}" \
            "ansible-lint>=6.22.0" \
            "yamllint>=1.32.0"

      - name: Install Ansible Galaxy collections
        run: |
          ansible-galaxy collection install \
            --requirements-file requirements.yml \
            --force-with-deps

      - name: Run yamllint
        run: |
          yamllint --config-file .yamllint .
        continue-on-error: false

      - name: Run ansible-lint
        run: |
          ansible-lint --config-file .ansible-lint playbooks/site.yml
        continue-on-error: false

  provision:
    name: "🚀 Provision — Full Ansible Run"
    runs-on: ubuntu-22.04
    needs: lint
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible and Docker SDK
        run: |
          pip install --upgrade pip
          pip install \
            "ansible${{ env.ANSIBLE_VERSION }}" \
            "docker>=6.0.0" \
            "requests>=2.28.0"

      - name: Install Ansible Galaxy collections
        run: |
          ansible-galaxy collection install \
            --requirements-file requirements.yml \
            --force-with-deps

      - name: Build test target Docker image
        run: |
          docker build \
            --file Dockerfile.test \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --label "ci=autoprovisionx" \
            .
          echo "✅ Test target image built successfully"

      - name: Launch test target container
        run: |
          docker run \
            --detach \
            --name ${{ env.CONTAINER_NAME }} \
            --hostname ${{ env.CONTAINER_NAME }} \
            --privileged \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --cgroupns=host \
            ${{ env.IMAGE_NAME }}:latest

          echo "Waiting for container initialization..."
          sleep 5

          docker ps --filter "name=${{ env.CONTAINER_NAME }}" --format "table {{.Names}}\t{{.Status}}"
          echo "✅ Test target container is running"

      - name: Display target container info
        run: |
          docker inspect ${{ env.CONTAINER_NAME }} \
            --format '{{.State.Status}} | IP: {{.NetworkSettings.IPAddress}}'

      - name: Run Ansible playbook against test target
        run: |
          ansible-playbook \
            --inventory inventory/hosts.ini \
            playbooks/site.yml \
            -v
        env:
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Verify nginx container is running inside target
        run: |
          NGINX_STATUS=$(docker exec ${{ env.CONTAINER_NAME }} \
            docker inspect autoprovisionx-nginx \
            --format '{{.State.Running}}' 2>/dev/null || echo "false")

          if [[ "$NGINX_STATUS" == "true" ]]; then
            echo "✅ Nginx container is running inside the target server"
          else
            echo "❌ Nginx container is NOT running"
            docker exec ${{ env.CONTAINER_NAME }} docker ps -a || true
            exit 1
          fi

      - name: Verify nginx HTTP response
        run: |
          HTTP_STATUS=$(docker exec ${{ env.CONTAINER_NAME }} \
            curl -s -o /dev/null -w "%{http_code}" http://localhost:80 \
            --max-time 10 \
            --retry 5 \
            --retry-delay 2 || echo "000")

          echo "HTTP Status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "✅ Nginx is responding with HTTP 200"
          else
            echo "❌ Nginx returned unexpected status: $HTTP_STATUS"
            docker exec ${{ env.CONTAINER_NAME }} docker logs autoprovisionx-nginx || true
            exit 1
          fi

      - name: Display provisioned server summary
        if: success()
        run: |
          echo "======================================================"
          echo "  AutoProvisionX CI — PROVISIONING COMPLETE ✅"
          echo "======================================================"
          echo "Target container : ${{ env.CONTAINER_NAME }}"
          echo "Nginx status     : Running"
          echo "HTTP check       : 200 OK"
          echo "======================================================"

      - name: Cleanup — Remove test containers and images
        if: always()
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true
          docker rmi ${{ env.IMAGE_NAME }}:latest 2>/dev/null || true
          echo "Cleanup complete."

  summary:
    name: "📊 Pipeline Summary"
    runs-on: ubuntu-22.04
    needs: [lint, provision]
    if: always()

    steps:
      - name: Report final pipeline status
        run: |
          LINT_STATUS="${{ needs.lint.result }}"
          PROVISION_STATUS="${{ needs.provision.result }}"

          echo "======================================================"
          echo "  AutoProvisionX Pipeline Summary"
          echo "======================================================"
          echo "  Lint stage       : $LINT_STATUS"
          echo "  Provision stage  : $PROVISION_STATUS"
          echo "======================================================"

          if [[ "$LINT_STATUS" == "success" && "$PROVISION_STATUS" == "success" ]]; then
            echo "  Overall Status   : ✅ ALL PASSED"
          else
            echo "  Overall Status   : ❌ FAILED"
            exit 1
          fi
